  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

F, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"30ae0ca7-40de-4dc7-85df-5469e94accea\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"0e53eeee-81d5-48d3-a7ce-17025f0db629\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box;}\n  body{margin:0;background:#17140E;}\n  html{scroll-behavior:smooth;}\n  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}\n  input:focus,textarea:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(240,81,43,.14);}\n  a{color:inherit;}\n  ::selection{background:var(--accent);color:#fff;}\n  @media(max-width:640px){\n    nav > div{padding:14px 16px!important;gap:12px!important;}\n    nav > div > div:last-child{gap:14px!important;}\n    header{padding:80px 18px 60px!important;}\n    section{padding-left:18px!important;padding-right:18px!important;padding-top:64px!important;padding-bottom:64px!important;}\n    #rsvp > div,#news,#buch > div{padding-top:64px!important;padding-bottom:64px!important;}\n    footer{padding:52px 18px!important;}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"--bg:#F4F1E9;--surface:#FFFFFF;--soft:#FBF9F4;--ink:#1A1814;--muted:#6B655A;--line:#E4DFD4;--accent:#F0512B;--dark:#17140E;background:var(--bg);color:var(--ink);font-family:'Instrument Sans',sans-serif;min-height:100vh;overflow-x:hidden;\">\n\n  \n\n  <sc-if value=\"{{ isSite }}\" hint-placeholder-val=\"{{ true }}\">\n  <div>\n    <!-- NAV -->\n    <nav style=\"position:sticky;top:0;z-index:50;background:rgba(23,20,14,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);\">\n      <div style=\"max-width:1080px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n        <a href=\"#start\" style=\"text-decoration:none;font:700 20px 'Space Grotesk';color:#F4F1E9;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;\">C<span style=\"color:var(--accent);\">·<\u002Fspan>30<\u002Fa>\n        <div style=\"display:flex;align-items:center;gap:22px;flex-wrap:wrap;\">\n          <a href=\"#details\" style=\"text-decoration:none;font:500 15px 'Instrument Sans';color:rgba(244,241,233,.75);\">Plan<\u002Fa>\n          <a href=\"#news\" style=\"text-decoration:none;font:500 15px 'Instrument Sans';color:rgba(244,241,233,.75);\">News<\u002Fa>\n          <a href=\"#buch\" style=\"text-decoration:none;font:500 15px 'Instrument Sans';color:rgba(244,241,233,.75);\">Gästebuch<\u002Fa>\n          <a href=\"#anfahrt\" style=\"text-decoration:none;font:500 15px 'Instrument Sans';color:rgba(244,241,233,.75);\">Anfahrt<\u002Fa>\n          <a href=\"#rsvp\" style=\"text-decoration:none;background:var(--accent);color:#fff;padding:9px 18px;border-radius:999px;font:600 14px 'Instrument Sans';\">Zusagen<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fnav>\n\n    <!-- HERO -->\n    <header id=\"start\" style=\"position:relative;background:var(--dark);color:#F4F1E9;padding:120px 24px 96px;overflow:hidden;\">\n      <div style=\"position:absolute;right:-3%;bottom:-16%;font:700 clamp(280px,44vw,600px) 'Space Grotesk';color:var(--accent);opacity:.11;line-height:.75;pointer-events:none;user-select:none;\">30<\u002Fdiv>\n      <div style=\"position:relative;max-width:1080px;margin:0 auto;text-align:center;\">\n        <div style=\"display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:7px 16px;font:600 13px 'Instrument Sans';letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:28px;\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;animation:floaty 2.4s ease-in-out infinite;\"><\u002Fspan>\n          24. → 25. Oktober 2026 · Weinheim\n        <\u002Fdiv>\n        <h1 style=\"font:700 clamp(46px,9vw,104px) 'Space Grotesk';line-height:.95;letter-spacing:-.03em;margin:0;\">Christian wird <span style=\"color:var(--accent);\">30.<\u002Fspan><\u002Fh1>\n        <p style=\"max-width:560px;margin:26px auto 0;font-size:clamp(16px,2.2vw,20px);line-height:1.55;color:rgba(244,241,233,.72);\">Ein halbes Leben Aufwärmen ist vorbei — jetzt wird gefeiert. Wir starten am Abend des 24. und tanzen in meinen Geburtstag hinein. Du bist eingeladen.<\u002Fp>\n\n        <sc-if value=\"{{ showCountdown }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:44px;\">\n          <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:18px 20px;min-width:92px;\">\n            <div style=\"font:700 clamp(34px,6vw,52px) 'Space Grotesk';line-height:1;\">{{ days }}<\u002Fdiv>\n            <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,241,233,.55);margin-top:8px;\">Tage<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:18px 20px;min-width:92px;\">\n            <div style=\"font:700 clamp(34px,6vw,52px) 'Space Grotesk';line-height:1;\">{{ hours }}<\u002Fdiv>\n            <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,241,233,.55);margin-top:8px;\">Stunden<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:18px 20px;min-width:92px;\">\n            <div style=\"font:700 clamp(34px,6vw,52px) 'Space Grotesk';line-height:1;\">{{ mins }}<\u002Fdiv>\n            <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,241,233,.55);margin-top:8px;\">Minuten<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:18px 20px;min-width:92px;\">\n            <div style=\"font:700 clamp(34px,6vw,52px) 'Space Grotesk';line-height:1;color:var(--accent);\">{{ secs }}<\u002Fdiv>\n            <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,241,233,.55);margin-top:8px;\">Sekunden<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:44px;\">\n          <a href=\"#rsvp\" style=\"text-decoration:none;background:var(--accent);color:#fff;padding:15px 28px;border-radius:999px;font:600 16px 'Instrument Sans';\">Ich bin dabei →<\u002Fa>\n          <a href=\"#details\" style=\"text-decoration:none;border:1px solid rgba(255,255,255,.25);color:#F4F1E9;padding:15px 28px;border-radius:999px;font:600 16px 'Instrument Sans';\">Was geplant ist<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- DETAILS -->\n    <section id=\"details\" style=\"max-width:1080px;margin:0 auto;padding:96px 24px;\">\n      <div style=\"font:600 13px 'Instrument Sans';letter-spacing:.12em;text-transform:uppercase;color:var(--accent);\">Der Plan<\u002Fdiv>\n      <h2 style=\"font:700 clamp(30px,5vw,48px) 'Space Grotesk';letter-spacing:-.02em;margin:12px 0 40px;\">Was dich erwartet<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;\">\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:30px;\">\n          <div style=\"font:600 13px 'Instrument Sans';letter-spacing:.1em;text-transform:uppercase;color:var(--muted);\">Wann<\u002Fdiv>\n          <div style=\"font:700 26px 'Space Grotesk';margin:14px 0 8px;\">Fr, 24. Oktober<\u002Fdiv>\n          <p style=\"margin:0;color:var(--muted);line-height:1.55;\">Los geht's ab 19 Uhr. Wir feiern in den 25. — meinen echten 30. — hinein.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:30px;\">\n          <div style=\"font:600 13px 'Instrument Sans';letter-spacing:.1em;text-transform:uppercase;color:var(--muted);\">Wo<\u002Fdiv>\n          <div style=\"font:700 26px 'Space Grotesk';margin:14px 0 8px;\">Beckstraße 14<\u002Fdiv>\n          <p style=\"margin:0;color:var(--muted);line-height:1.55;\">69469 Weinheim. Parken in den Seitenstraßen, Bahnhof zu Fuß erreichbar.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- RSVP -->\n    <section id=\"rsvp\" style=\"background:var(--soft);border-top:1px solid var(--line);border-bottom:1px solid var(--line);\">\n      <div style=\"max-width:640px;margin:0 auto;padding:96px 24px;\">\n        <div style=\"font:600 13px 'Instrument Sans';letter-spacing:.12em;text-transform:uppercase;color:var(--accent);\">Zu- &amp; Absage<\u002Fdiv>\n        <h2 style=\"font:700 clamp(30px,5vw,48px) 'Space Grotesk';letter-spacing:-.02em;margin:12px 0 6px;\">Sag mir Bescheid<\u002Fh2>\n        <p style=\"color:var(--muted);line-height:1.55;margin:0 0 8px;\">Damit ich richtig planen und alles vorbereiten kann — trag dich kurz ein.<\u002Fp>\n        <p style=\"color:var(--accent);font-weight:600;margin:0 0 32px;\">{{ confirmedText }}<\u002Fp>\n\n        <sc-if value=\"{{ showForm }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:30px;\">\n          <label style=\"display:block;font-weight:600;margin-bottom:10px;\">Kommst du?<\u002Flabel>\n          <div style=\"display:flex;gap:12px;margin-bottom:22px;\">\n            <button type=\"button\" onclick=\"{{ setYes }}\" style=\"{{ yesStyle }}\">Bin dabei<\u002Fbutton>\n            <button type=\"button\" onclick=\"{{ setNo }}\" style=\"{{ noStyle }}\">Kann leider nicht<\u002Fbutton>\n          <\u002Fdiv>\n\n          <label style=\"display:block;font-weight:600;margin-bottom:8px;\">Dein Name<\u002Flabel>\n          <input value=\"{{ name }}\" onchange=\"{{ onName }}\" placeholder=\"Wie heißt du?\" style=\"width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;background:var(--soft);font:400 16px 'Instrument Sans';color:var(--ink);margin-bottom:22px;\">\n\n          <label style=\"display:block;font-weight:600;margin-bottom:8px;\">Allergien / Ernährung<\u002Flabel>\n          <textarea value=\"{{ allergies }}\" onchange=\"{{ onAllergies }}\" placeholder=\"z.B. Nüsse, laktosefrei, vegetarisch … oder leer lassen\" rows=\"3\" style=\"width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;background:var(--soft);font:400 16px 'Instrument Sans';color:var(--ink);resize:vertical;margin-bottom:26px;\"><\u002Ftextarea>\n\n          <button type=\"button\" onclick=\"{{ submitRsvp }}\" style=\"width:100%;background:var(--accent);color:#fff;border:none;padding:16px;border-radius:12px;font:600 16px 'Instrument Sans';cursor:pointer;\">Antwort absenden<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ rsvpDone }}\">\n        <div style=\"background:var(--dark);color:#F4F1E9;border-radius:22px;padding:40px 30px;text-align:center;\">\n          <div style=\"font:700 28px 'Space Grotesk';margin-bottom:12px;\">Danke, du stehst auf der Liste!<\u002Fdiv>\n          <p style=\"color:rgba(244,241,233,.7);line-height:1.55;margin:0 0 24px;\">Ich freu mich auf dich. Alle Updates findest du hier auf der Seite — schau ab und zu vorbei.<\u002Fp>\n          <button type=\"button\" onclick=\"{{ resetRsvp }}\" style=\"background:transparent;border:1px solid rgba(255,255,255,.28);color:#F4F1E9;padding:12px 24px;border-radius:999px;font:600 15px 'Instrument Sans';cursor:pointer;\">Antwort ändern<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- NEWS -->\n    <section id=\"news\" style=\"max-width:780px;margin:0 auto;padding:96px 24px;\">\n      <div style=\"font:600 13px 'Instrument Sans';letter-spacing:.12em;text-transform:uppercase;color:var(--accent);\">Aktuelles<\u002Fdiv>\n      <h2 style=\"font:700 clamp(30px,5vw,48px) 'Space Grotesk';letter-spacing:-.02em;margin:12px 0 6px;\">Neuigkeiten<\u002Fh2>\n      <p style=\"color:var(--muted);line-height:1.55;margin:0 0 40px;\">Hier landen alle Infos vor der Party. Reinschauen lohnt sich.<\u002Fp>\n      <sc-if value=\"{{ updatesEmpty }}\">\n        <p style=\"text-align:center;color:var(--muted);padding:24px;background:var(--surface);border:1px solid var(--line);border-radius:18px;\">Noch keine Neuigkeiten — bald mehr!<\u002Fp>\n      <\u002Fsc-if>\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <sc-for list=\"{{ updates }}\" as=\"u\" hint-placeholder-count=\"2\">\n          <article style=\"background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:26px 28px;border-left:3px solid var(--accent);\">\n            <div style=\"font:600 12px 'Instrument Sans';letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;\">{{ u.dateStr }}<\u002Fdiv>\n            <h3 style=\"font:700 21px 'Space Grotesk';margin:0 0 8px;\">{{ u.t }}<\u002Fh3>\n            <p style=\"margin:0;color:var(--muted);line-height:1.6;\">{{ u.b }}<\u002Fp>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- GÄSTEBUCH -->\n    <section id=\"buch\" style=\"background:var(--soft);border-top:1px solid var(--line);border-bottom:1px solid var(--line);\">\n      <div style=\"max-width:780px;margin:0 auto;padding:96px 24px;\">\n        <div style=\"font:600 13px 'Instrument Sans';letter-spacing:.12em;text-transform:uppercase;color:var(--accent);\">Gästebuch<\u002Fdiv>\n        <h2 style=\"font:700 clamp(30px,5vw,48px) 'Space Grotesk';letter-spacing:-.02em;margin:12px 0 6px;\">Hinterlass was Nettes<\u002Fh2>\n        <p style=\"color:var(--muted);line-height:1.55;margin:0 0 32px;\">Ein Gruß, ein Spruch, eine Vorfreude — schreib rein.<\u002Fp>\n\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:24px;display:flex;flex-direction:column;gap:14px;margin-bottom:32px;\">\n          <input value=\"{{ gbName }}\" onchange=\"{{ onGbName }}\" placeholder=\"Dein Name\" style=\"width:100%;padding:13px;border:1px solid var(--line);border-radius:11px;background:var(--soft);font:400 16px 'Instrument Sans';color:var(--ink);\">\n          <textarea value=\"{{ gbMsg }}\" onchange=\"{{ onGbMsg }}\" placeholder=\"Deine Nachricht …\" rows=\"3\" style=\"width:100%;padding:13px;border:1px solid var(--line);border-radius:11px;background:var(--soft);font:400 16px 'Instrument Sans';color:var(--ink);resize:vertical;\"><\u002Ftextarea>\n          <button type=\"button\" onclick=\"{{ submitGb }}\" style=\"align-self:flex-start;background:var(--ink);color:#fff;border:none;padding:13px 24px;border-radius:999px;font:600 15px 'Instrument Sans';cursor:pointer;\">Eintragen<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ guestbookEmpty }}\">\n          <p style=\"text-align:center;color:var(--muted);padding:24px;\">Noch keine Einträge — mach den Anfang!<\u002Fp>\n        <\u002Fsc-if>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <sc-for list=\"{{ guestbook }}\" as=\"g\" hint-placeholder-count=\"0\">\n            <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px 24px;\">\n              <p style=\"margin:0 0 10px;line-height:1.6;\">{{ g.msg }}<\u002Fp>\n              <div style=\"font:600 14px 'Instrument Sans';color:var(--accent);\">{{ g.name }} quot;text&quot;,&quot;default&quot;:&quot;https://odpisejilxwaacaqxrlp.supabase.co&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Supabase (Speicherung)&quot;},&quot;supabaseAnonKey&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;sb_publishable_f2CoOuhQU37Pdh3ogDwdKw_sAaP6_6J&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Supabase (Speicherung)&quot;}}\">\nconst DEFAULT_UPDATES = [\n  { t: \"Save the Date!\", b: \"Der 24. Oktober ist gesetzt. Alle Infos zur Feier sammle ich hier auf der Seite — reinschauen lohnt sich.\", ts: Date.parse(\"2026-06-19T18:00:00\") }\n];\n\nclass Component extends DCLogic {\n  state = {\n    view: \"site\", now: Date.now(),\n    attending: \"yes\", name: \"\", plusOne: false, plusOneName: \"\", allergies: \"\", rsvpDone: false,\n    gbName: \"\", gbMsg: \"\",\n    adminAuthed: false, adminPass: \"\", adminError: \"\", tab: \"rsvps\",\n    newTitle: \"\", newBody: \"\", copied: false, online: false,\n    rsvps: [], updates: DEFAULT_UPDATES, guestbook: []\n  };\n  target = Date.parse(\"2026-10-24T19:00:00\");\n\n  componentDidMount() {\n    this.syncHash();\n    this._t = setInterval(() => this.setState({ now: Date.now() }), 1000);\n    this._h = () => this.syncHash();\n    window.addEventListener(\"hashchange\", this._h);\n    this.initStore(0);\n  }\n  componentWillUnmount() {\n    clearInterval(this._t);\n    clearInterval(this._poll);\n    window.removeEventListener(\"hashchange\", this._h);\n  }\n  syncHash() {\n    this.setState({ view: location.hash === \"#admin\" ? \"admin\" : \"site\" });\n  }\n\n  initStore(tries) {\n    const url = (this.props.supabaseUrl || \"\").trim();\n    const key = (this.props.supabaseAnonKey || \"\").trim();\n    if (url && key) {\n      if (window.supabase && window.supabase.createClient) {\n        try {\n          this.sb = window.supabase.createClient(url, key);\n          this.online = true;\n          this.setState({ online: true });\n          this.fetchAll();\n          this._poll = setInterval(() => this.fetchAll(), 15000);\n          return;\n        } catch (e) {}\n      } else if (tries < 40) {\n        setTimeout(() => this.initStore(tries + 1), 150);\n        return;\n      }\n    }\n    this.online = false;\n    this.setState({ online: false });\n    this.load();\n  }\n\n  async fetchAll() {\n    if (!this.sb) return;\n    try {\n      const [r, g, u] = await Promise.all([\n        this.sb.from(\"rsvps\").select(\"*\").order(\"created_at\", { ascending: false }),\n        this.sb.from(\"guestbook\").select(\"*\").order(\"created_at\", { ascending: false }),\n        this.sb.from(\"updates\").select(\"*\").order(\"created_at\", { ascending: false })\n      ]);\n      const next = {};\n      if (r.data) next.rsvps = r.data.map(x => ({ id: x.id, name: x.name, attending: x.attending, plusOne: !!x.plus_one, plusOneName: x.plus_one_name || \"\", allergies: x.allergies || \"\", ts: Date.parse(x.created_at) }));\n      if (g.data) next.guestbook = g.data.map(x => ({ id: x.id, name: x.name, msg: x.msg, ts: Date.parse(x.created_at) }));\n      if (u.data) next.updates = u.data.map(x => ({ id: x.id, t: x.title, b: x.body || \"\", ts: Date.parse(x.created_at) }));\n      this.setState(next);\n    } catch (e) {}\n  }\n\n  load() {\n    try {\n      const r = JSON.parse(localStorage.getItem(\"c30_rsvps\") || \"[]\");\n      const g = JSON.parse(localStorage.getItem(\"c30_guestbook\") || \"[]\");\n      const u = JSON.parse(localStorage.getItem(\"c30_updates\") || \"null\");\n      this.setState({\n        rsvps: Array.isArray(r) ? r : [],\n        guestbook: Array.isArray(g) ? g : [],\n        updates: Array.isArray(u) ? u : DEFAULT_UPDATES\n      });\n    } catch (e) {}\n  }\n  persist(key, val) { try { localStorage.setItem(\"c30_\" + key, JSON.stringify(val)); } catch (e) {} }\n\n  submitRsvp = async () => {\n    if (!this.state.name.trim()) return;\n    if (this.online && this.sb) {\n      try {\n        await this.sb.from(\"rsvps\").insert({\n          name: this.state.name.trim(), attending: this.state.attending,\n          plus_one: this.state.plusOne, plus_one_name: this.state.plusOneName.trim(),\n          allergies: this.state.allergies.trim()\n        });\n        this.fetchAll();\n      } catch (e) {}\n      this.setState({ rsvpDone: true });\n      return;\n    }\n    const entry = {\n      name: this.state.name.trim(), attending: this.state.attending,\n      plusOne: this.state.plusOne, plusOneName: this.state.plusOneName.trim(),\n      allergies: this.state.allergies.trim(), ts: Date.now()\n    };\n    const rsvps = [entry, ...this.state.rsvps];\n    this.persist(\"rsvps\", rsvps);\n    this.setState({ rsvps, rsvpDone: true });\n  };\n  resetRsvp = () => this.setState({ rsvpDone: false, name: \"\", plusOne: false, plusOneName: \"\", allergies: \"\", attending: \"yes\" });\n\n  submitGb = async () => {\n    if (!this.state.gbName.trim() || !this.state.gbMsg.trim()) return;\n    if (this.online && this.sb) {\n      try {\n        await this.sb.from(\"guestbook\").insert({ name: this.state.gbName.trim(), msg: this.state.gbMsg.trim() });\n        this.fetchAll();\n      } catch (e) {}\n      this.setState({ gbName: \"\", gbMsg: \"\" });\n      return;\n    }\n    const entry = { name: this.state.gbName.trim(), msg: this.state.gbMsg.trim(), ts: Date.now() };\n    const guestbook = [entry, ...this.state.guestbook];\n    this.persist(\"guestbook\", guestbook);\n    this.setState({ guestbook, gbName: \"\", gbMsg: \"\" });\n  };\n\n  adminLogin = () => {\n    const pass = this.props.adminPassword || \"christian30\";\n    if (this.state.adminPass === pass) this.setState({ adminAuthed: true, adminError: \"\", adminPass: \"\" });\n    else this.setState({ adminError: \"Falsches Passwort. Versuch's nochmal.\" });\n  };\n  adminLogout = () => this.setState({ adminAuthed: false });\n\n  addUpdate = async () => {\n    if (!this.state.newTitle.trim()) return;\n    if (this.online && this.sb) {\n      try {\n        await this.sb.from(\"updates\").insert({ title: this.state.newTitle.trim(), body: this.state.newBody.trim() });\n        this.fetchAll();\n      } catch (e) {}\n      this.setState({ newTitle: \"\", newBody: \"\" });\n      return;\n    }\n    const entry = { t: this.state.newTitle.trim(), b: this.state.newBody.trim(), ts: Date.now() };\n    const updates = [entry, ...this.state.updates];\n    this.persist(\"updates\", updates);\n    this.setState({ updates, newTitle: \"\", newBody: \"\" });\n  };\n  deleteRsvp = async (i) => {\n    if (this.online && this.sb) { try { await this.sb.from(\"rsvps\").delete().eq(\"id\", this.state.rsvps[i].id); this.fetchAll(); } catch (e) {} return; }\n    const a = this.state.rsvps.slice(); a.splice(i, 1); this.persist(\"rsvps\", a); this.setState({ rsvps: a });\n  };\n  deleteUpdate = async (i) => {\n    if (this.online && this.sb) { try { await this.sb.from(\"updates\").delete().eq(\"id\", this.state.updates[i].id); this.fetchAll(); } catch (e) {} return; }\n    const a = this.state.updates.slice(); a.splice(i, 1); this.persist(\"updates\", a); this.setState({ updates: a });\n  };\n  deleteGb = async (i) => {\n    if (this.online && this.sb) { try { await this.sb.from(\"guestbook\").delete().eq(\"id\", this.state.guestbook[i].id); this.fetchAll(); } catch (e) {} return; }\n    const a = this.state.guestbook.slice(); a.splice(i, 1); this.persist(\"guestbook\", a); this.setState({ guestbook: a });\n  };\n\n  exportData = () => {\n    const data = JSON.stringify({ rsvps: this.state.rsvps, guestbook: this.state.guestbook, updates: this.state.updates }, null, 2);\n    try { navigator.clipboard.writeText(data); } catch (e) {}\n    this.setState({ copied: true });\n    setTimeout(() => this.setState({ copied: false }), 2000);\n  };\n\n  fmt = (ts) => { try { return new Date(ts).toLocaleDateString(\"de-DE\", { day: \"numeric\", month: \"long\", year: \"numeric\" }); } catch (e) { return \"\"; } };\n\n  renderVals() {\n    const s = this.state;\n    const showCountdown = this.props.showCountdown ?? true;\n    const allowPlusOne = this.props.allowPlusOne ?? true;\n    const diff = Math.max(0, this.target - s.now);\n    const days = Math.floor(diff / 86400000);\n    const hours = Math.floor((diff % 86400000) / 3600000);\n    const mins = Math.floor((diff % 3600000) / 60000);\n    const secs = Math.floor((diff % 60000) / 1000);\n    const pad = (n) => String(n).padStart(2, \"0\");\n\n    const yes = s.rsvps.filter(r => r.attending === \"yes\");\n    const no = s.rsvps.filter(r => r.attending === \"no\");\n    const guests = yes.length + yes.filter(r => r.plusOne).length;\n    const allergyEntries = s.rsvps.filter(r => r.allergies).map(r => ({ name: r.name, allergies: r.allergies }));\n    const confirmedText = yes.length === 0\n      ? \"Sei die erste Zusage.\"\n      : (yes.length === 1 ? \"Eine Person ist schon dabei.\" : yes.length + \" Leute sind schon dabei.\");\n\n    const toggleBase = \"flex:1;padding:14px;border-radius:12px;border:1px solid var(--line);background:var(--surface);cursor:pointer;font:600 15px 'Instrument Sans';color:var(--ink);\";\n    const toggleActive = \"flex:1;padding:14px;border-radius:12px;border:1px solid var(--accent);background:var(--accent);cursor:pointer;font:600 15px 'Instrument Sans';color:#fff;\";\n\n    const online = s.online;\n    const connText = online ? \"Live verbunden – Antworten laufen bei dir zusammen\" : \"Lokaler Modus – Supabase-Zugangsdaten noch nicht gesetzt\";\n    const connDotStyle = \"width:8px;height:8px;border-radius:50%;display:inline-block;background:\" + (online ? \"#1F9D6B\" : \"#E0A23B\") + \";\";\n\n    const tabStyle = (k) => \"padding:10px 18px;border-radius:999px;border:none;cursor:pointer;font:600 14px 'Instrument Sans';background:\" + (s.tab === k ? \"var(--ink)\" : \"transparent\") + \";color:\" + (s.tab === k ? \"#fff\" : \"var(--muted)\") + \";\";\n\n    const updates = s.updates.map((u, i) => ({ t: u.t, b: u.b, dateStr: this.fmt(u.ts), onDelete: () => this.deleteUpdate(i) }));\n    const guestbook = s.guestbook.map((g, i) => ({ name: g.name, msg: g.msg, dateStr: this.fmt(g.ts), onDelete: () => this.deleteGb(i) }));\n    const rsvps = s.rsvps.map((r, i) => ({\n      name: r.name,\n      statusLabel: r.attending === \"yes\" ? \"Zusage\" : \"Absage\",\n      statusStyle: \"font:600 12px 'Instrument Sans';padding:3px 10px;border-radius:999px;\" + (r.attending === \"yes\" ? \"background:rgba(31,157,107,.14);color:#1F9D6B;\" : \"background:rgba(240,81,43,.14);color:var(--accent);\"),\n      plusText: r.plusOne ? (\"+1\" + (r.plusOneName ? \" · \" + r.plusOneName : \"\")) : \"—\",\n      allergyText: r.allergies || \"keine\",\n      dateStr: this.fmt(r.ts),\n      onDelete: () => this.deleteRsvp(i)\n    }));\n\n    return {\n      isSite: s.view === \"site\", isAdmin: s.view === \"admin\",\n      showCountdown, allowPlusOne,\n      days: String(days), hours: pad(hours), mins: pad(mins), secs: pad(secs),\n      attending: s.attending, name: s.name, plusOne: s.plusOne, plusOneName: s.plusOneName, allergies: s.allergies,\n      rsvpDone: s.rsvpDone, showForm: !s.rsvpDone, showPlusOneName: allowPlusOne && s.plusOne,\n      yesStyle: s.attending === \"yes\" ? toggleActive : toggleBase,\n      noStyle: s.attending === \"no\" ? toggleActive : toggleBase,\n      onName: (e) => this.setState({ name: e.target.value }),\n      onAllergies: (e) => this.setState({ allergies: e.target.value }),\n      onPlusOne: (e) => this.setState({ plusOne: e.target.checked }),\n      onPlusOneName: (e) => this.setState({ plusOneName: e.target.value }),\n      setYes: () => this.setState({ attending: \"yes\" }),\n      setNo: () => this.setState({ attending: \"no\" }),\n      submitRsvp: this.submitRsvp, resetRsvp: this.resetRsvp,\n      confirmedText,\n      gbName: s.gbName, gbMsg: s.gbMsg,\n      onGbName: (e) => this.setState({ gbName: e.target.value }),\n      onGbMsg: (e) => this.setState({ gbMsg: e.target.value }),\n      submitGb: this.submitGb,\n      guestbook, guestbookEmpty: guestbook.length === 0,\n      updates, updatesEmpty: updates.length === 0,\n      adminAuthed: s.adminAuthed, showLogin: !s.adminAuthed,\n      adminPass: s.adminPass, adminError: s.adminError, hasAdminError: !!s.adminError,\n      onAdminPass: (e) => this.setState({ adminPass: e.target.value }),\n      onAdminKey: (e) => { if (e.key === \"Enter\") this.adminLogin(); },\n      adminLogin: this.adminLogin, adminLogout: this.adminLogout,\n      statYes: yes.length, statNo: no.length, statGuests: guests, statAllergies: allergyEntries.length,\n      allergyEntries, allergyEmpty: allergyEntries.length === 0,\n      rsvps, rsvpsEmpty: rsvps.length === 0,\n      isTabRsvps: s.tab === \"rsvps\", isTabAllergien: s.tab === \"allergien\", isTabNews: s.tab === \"news\", isTabBuch: s.tab === \"buch\",\n      tabRsvpsStyle: tabStyle(\"rsvps\"), tabAllergienStyle: tabStyle(\"allergien\"), tabNewsStyle: tabStyle(\"news\"), tabBuchStyle: tabStyle(\"buch\"),\n      setTabRsvps: () => this.setState({ tab: \"rsvps\" }), setTabAllergien: () => this.setState({ tab: \"allergien\" }),\n      setTabNews: () => this.setState({ tab: \"news\" }), setTabBuch: () => this.setState({ tab: \"buch\" }),\n      newTitle: s.newTitle, newBody: s.newBody,\n      onNewTitle: (e) => this.setState({ newTitle: e.target.value }), onNewBody: (e) => this.setState({ newBody: e.target.value }),\n      addUpdate: this.addUpdate, exportData: this.exportData,\n      exportLabel: s.copied ? \"Kopiert!\" : \"Daten exportieren\",\n      connText, connDotStyle\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
